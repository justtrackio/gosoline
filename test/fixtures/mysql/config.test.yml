app:
  env: test
  name: fixture-loader
  tags:
    project: gosoline
    family: integration-test
    group: grp
  model_id:
    pattern: "!nodecode {app.tags.project}-{app.env}-{app.tags.family}-{app.tags.group}-{modelId}"

db:
  default:
    driver: mysql
    max_connection_lifetime: 120
    parse_time: true
    uri:
      host: 127.0.0.1
      port: 3306
      user: gosoline
      password: gosoline
      database: gosoline
    migrations:
      enabled: true
      table_prefixed: false
      path: migrations

fixtures:
  enabled: true
